<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cactoys Supreme Dictionary</title>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0d0d0d;
            --card-bg: #161616;
            --text: #e0ffe0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(180deg, #001a0d 0%, var(--bg) 100%);
            border-bottom: 2px solid var(--primary);
            padding: 40px 20px;
            text-align: center;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--primary);
        }

        .search-container {
            position: sticky;
            top: 0;
            background: var(--bg);
            padding: 20px;
            z-index: 100;
        }

        #searchBox {
            width: 90%;
            max-width: 800px;
            padding: 15px;
            margin: 0 auto;
            display: block;
            font-size: 18px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: var(--primary);
            border-radius: 4px;
            outline: none;
            transition: 0.3s;
        }

        #searchBox:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        #dictionary {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .word {
            margin-bottom: 15px;
            padding: 20px;
            background: var(--card-bg);
            border-left: 4px solid #333;
            border-radius: 0 8px 8px 0;
            transition: 0.2s;
        }

        .word:hover {
            border-left-color: var(--primary);
            background: #1d1d1d;
            transform: translateX(5px);
        }

        .word strong {
            color: var(--primary);
            font-size: 1.2em;
            display: block;
            margin-bottom: 5px;
        }

        .tag {
            font-size: 10px;
            background: #333;
            padding: 2px 8px;
            border-radius: 10px;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: inline-block;
        }

        .highlight {
            background: rgba(0, 255, 136, 0.3);
            color: white;
        }

        .stats {
            text-align: center;
            font-size: 12px;
            color: #666;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<header>🌵 Cactoys Supreme Dictionary ☥</header>

<div class="search-container">
    <input type="text" id="searchBox" placeholder="Acessar banco de dados..." autocomplete="off">
</div>

<div class="stats" id="counter">Carregando arquivos...</div>

<div id="dictionary"></div>

<script>
// Base de dados expandida com tipos
const words = [
    {title: "Agnes", type: "Entidade", desc: "Uma gigante descoberta após cruzar um portal."},
    {title: "Anti-Void", type: "Dimensão", desc: "Dimensão oposta ao Void. Silêncio absoluto."},
    {title: "Banbanzinho", type: "Explorador", desc: "O principal explorador do multiverso Cactoys."},
    {title: "Crossbuck", type: "Entidade", desc: "Entidade ferroviária que persegue alvos a 45 studs/s."},
    {title: "EMC2 Database", type: "Arquivo", desc: "Arquivo secreto de conhecimento universal."},
    {title: "OCOM", type: "Sistema", desc: "Official Computer of Mine. O núcleo técnico."},
    {title: "Seekinho", type: "Entidade", desc: "Observador que manifesta anomalias em loop."},
    {title: "UKR", type: "Local", desc: "Universal Kristall Rubro. Instalação industrial de processamento."},
    {title: "Void", type: "Dimensão", desc: "Dimensão quebrada e escura onde a realidade falha."},
    // ... Adicione os outros aqui mantendo o padrão {title, type, desc}
];

const container = document.getElementById("dictionary");
const counter = document.getElementById("counter");

function render(list, term = ""){
    container.innerHTML = "";
    counter.innerText = `${list.length} registros encontrados`;

    list.forEach(w => {
        const div = document.createElement("div");
        div.className = "word";
        
        let title = w.title;
        let desc = w.desc;

        // Efeito de destaque na busca
        if(term) {
            const reg = new RegExp(`(${term})`, "gi");
            title = title.replace(reg, "<span class='highlight'>$1</span>");
            desc = desc.replace(reg, "<span class='highlight'>$1</span>");
        }

        div.innerHTML = `
            <span class="tag">${w.type || 'Registro'}</span>
            <strong>${title}</strong>
            <span>${desc}</span>
        `;
        container.appendChild(div);
    });
}

// Inicialização
render(words);

// Logica de busca
document.getElementById("searchBox").addEventListener("input", function(){
    const term = this.value.toLowerCase();
    const filtered = words.filter(w =>
        w.title.toLowerCase().includes(term) ||
        w.desc.toLowerCase().includes(term) ||
        (w.type && w.type.toLowerCase().includes(term))
    );
    render(filtered, term);
});

// Suporte a busca via URL (ex: ?q=Crossbuck)
const urlParams = new URLSearchParams(window.location.search);
if(urlParams.has('q')) {
    const q = urlParams.get('q');
    document.getElementById("searchBox").value = q;
    const filtered = words.filter(w => w.title.toLowerCase().includes(q.toLowerCase()));
    render(filtered, q);
}
</script>

</body>
</html>
